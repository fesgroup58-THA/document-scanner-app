<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Scanner & Email Sender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="email"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #667eea;
        }

        .file-upload-label:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .file-upload-label.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            margin-top: 15px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .file-item-name {
            font-weight: 500;
            color: #333;
            flex: 1;
        }

        .file-item-size {
            color: #999;
            font-size: 12px;
            margin: 0 10px;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: 600;
            padding: 0 8px;
        }

        .btn-remove:hover {
            opacity: 0.7;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-content {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">📄</span>
            <h1>Document Scanner</h1>
            <p class="subtitle">สแกนเอกสารและส่งอีเมลอัตโนมัติ</p>
        </div>

        <form id="scannerForm">
            <!-- Email Destination -->
            <div class="form-group">
                <label for="recipientEmail">🎯 ที่อยู่อีเมลปลายทาง</label>
                <input 
                    type="email" 
                    id="recipientEmail" 
                    name="recipientEmail"
                    placeholder="example@gmail.com"
                    required
                >
            </div>

            <!-- Subject -->
            <div class="form-group">
                <label for="emailSubject">✉️ หัวเรื่อง</label>
                <input 
                    type="text" 
                    id="emailSubject" 
                    name="emailSubject"
                    placeholder="เช่น: เอกสารใบสั่งซื้อ"
                    value="เอกสารสแกน"
                    required
                >
            </div>

            <!-- Additional Message -->
            <div class="form-group">
                <label for="emailMessage">💬 ข้อความเพิ่มเติม (ไม่บังคับ)</label>
                <textarea 
                    id="emailMessage" 
                    name="emailMessage"
                    placeholder="เพิ่มข้อความกำหนดเอง หรือปล่อยว่างไว้"
                ></textarea>
            </div>

            <!-- File Upload -->
            <div class="file-upload-wrapper">
                <label class="file-upload-label" id="uploadLabel">
                    <span>📁</span>
                    <span>ลากและวาง หรือคลิกเพื่ออัปโหลดเอกสาร</span>
                </label>
                <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.txt">
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn">
                📤 สแกนและส่งอีเมล
            </button>

            <!-- Status Message -->
            <div id="status" class="status"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('scannerForm');
        const fileInput = document.getElementById('fileInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const fileList = document.getElementById('fileList');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        let selectedFiles = [];

        // Drag and drop
        uploadLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadLabel.classList.add('dragover');
        });

        uploadLabel.addEventListener('dragleave', () => {
            uploadLabel.classList.remove('dragover');
        });

        uploadLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadLabel.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });

        uploadLabel.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            addFiles(files);
        });

        function addFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const size = (file.size / 1024).toFixed(1);
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-item-name">${file.name}</span>
                    <span class="file-item-size">${size} KB</span>
                    <button type="button" class="btn-remove">❌</button>
                `;
                item.querySelector('.btn-remove').addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedFiles.splice(index, 1);
                    renderFileList();
                });
                fileList.appendChild(item);
            });
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (selectedFiles.length === 0) {
                showStatus('❌ กรุณาเลือกอย่างน้อย 1 เอกสาร', 'error');
                return;
            }

            const recipientEmail = document.getElementById('recipientEmail').value;
            const emailSubject = document.getElementById('emailSubject').value;
            const emailMessage = document.getElementById('emailMessage').value;

            // Show processing status
            submitBtn.disabled = true;
            showStatus(`⏳ กำลังประมวลผล ${selectedFiles.length} เอกสาร...`, 'info');

            try {
                // Convert files to base64
                const filesData = [];
                for (const file of selectedFiles) {
                    const base64 = await fileToBase64(file);
                    filesData.push({
                        name: file.name,
                        type: file.type,
                        data: base64
                    });
                }

                // Send to API
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 2000,
                        messages: [
                            {
                                role: 'user',
                                content: [
                                    {
                                        type: 'text',
                                        text: `สแกนและสรุปข้อมูลจากเอกสารต่อไปนี้ (${selectedFiles.length} ไฟล์):
                                        
ชื่อไฟล์และประเภท:
${filesData.map(f => `- ${f.name} (${f.type})`).join('\n')}

โปรดสรุปข้อมูลสำคัญจากเอกสารแต่ละฉบับ รวมถึง:
- ประเภทเอกสาร
- วันที่
- คู่สัญญา/บุคคลที่เกี่ยวข้อง
- จำนวนเงิน (หากมี)
- รายละเอียดสำคัญอื่น ๆ`
                                    }
                                ]
                            }
                        ]
                    })
                });

                const result = await response.json();
                const documentSummary = result.content[0].text;

                // Prepare email content
                const emailContent = `
สำเร็จแล้ว! เอกสารสำหรับส่ง:

ไฟล์ที่สแกน:
${selectedFiles.map(f => `• ${f.name}`).join('\n')}

สรุปข้อมูลเอกสาร:
${documentSummary}

${emailMessage ? `\nข้อความเพิ่มเติม:\n${emailMessage}` : ''}

---
สร้างโดย Document Scanner App
`;

                // Show success with email content
                showStatus(
                    `✅ สแกนสำเร็จ! ได้รับ ${selectedFiles.length} เอกสาร\n\n📧 ส่งไปที่: ${recipientEmail}\n✉️ หัวเรื่อง: ${emailSubject}`,
                    'success'
                );

                console.log('Email Content:', emailContent);
                console.log('Ready to send to:', recipientEmail);

                // Reset form
                selectedFiles = [];
                renderFileList();
                form.reset();

            } catch (error) {
                console.error('Error:', error);
                showStatus(
                    `❌ เกิดข้อผิดพลาด: ${error.message}`,
                    'error'
                );
            } finally {
                submitBtn.disabled = false;
            }
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
