<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Scanner & Email Sender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
        }

        .user-info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            display: none;
        }

        .user-info.show {
            display: block;
        }

        .user-info-text {
            color: #333;
            margin-bottom: 8px;
        }

        .user-info-text strong {
            color: #667eea;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-decoration: underline;
        }

        .logout-btn:hover {
            opacity: 0.7;
        }

        /* Auth Section */
        .auth-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .google-login-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .google-login-btn:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .google-login-btn img {
            width: 20px;
            height: 20px;
        }

        /* Form Section */
        .form-section {
            display: none;
        }

        .form-section.show {
            display: block;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="email"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #667eea;
        }

        .file-upload-label:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .file-upload-label.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            margin-top: 15px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .file-item-name {
            font-weight: 500;
            color: #333;
            flex: 1;
        }

        .file-item-size {
            color: #999;
            font-size: 12px;
            margin: 0 10px;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: 600;
            padding: 0 8px;
        }

        .btn-remove:hover {
            opacity: 0.7;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">📄</span>
            <h1>Document Scanner</h1>
            <p class="subtitle">สแกนเอกสารและส่งอีเมลอัตโนมัติ</p>
        </div>

        <!-- User Info Section -->
        <div class="user-info" id="userInfo">
            <div class="user-info-text">
                👤 <strong id="userName"></strong> (<span id="userEmail"></span>)
            </div>
            <button class="logout-btn" id="logoutBtn">ออกจากระบบ</button>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="authSection">
            <button class="google-login-btn" id="googleLoginBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                ลงชื่อเข้าด้วย Google
            </button>
        </div>

        <!-- Form Section -->
        <form id="scannerForm" class="form-section">
            <div class="form-group">
                <label for="recipientEmail">🎯 ที่อยู่อีเมลปลายทาง</label>
                <input 
                    type="email" 
                    id="recipientEmail" 
                    name="recipientEmail"
                    placeholder="example@gmail.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="emailSubject">✉️ หัวเรื่อง</label>
                <input 
                    type="text" 
                    id="emailSubject" 
                    name="emailSubject"
                    placeholder="เช่น: เอกสารใบสั่งซื้อ"
                    value="เอกสารสแกน"
                    required
                >
            </div>

            <div class="form-group">
                <label for="emailMessage">💬 ข้อความเพิ่มเติม (ไม่บังคับ)</label>
                <textarea 
                    id="emailMessage" 
                    name="emailMessage"
                    placeholder="เพิ่มข้อความกำหนดเอง หรือปล่อยว่างไว้"
                ></textarea>
            </div>

            <div class="file-upload-wrapper">
                <label class="file-upload-label" id="uploadLabel">
                    <span>📁</span>
                    <span>ลากและวาง หรือคลิกเพื่ออัปโหลดเอกสาร</span>
                </label>
                <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.txt">
                <div class="file-list" id="fileList"></div>
            </div>

            <button type="submit" id="submitBtn">
                📤 สแกนและส่งอีเมล
            </button>

            <div id="status" class="status"></div>
        </form>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = window.location.origin;
        const GOOGLE_CLIENT_ID = '330181663366-v8g6iueboedjv3s1cv0o5p2hq8dmph7c.apps.googleusercontent.com';
        
        // Elements
        const authSection = document.getElementById('authSection');
        const userInfo = document.getElementById('userInfo');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const scannerForm = document.getElementById('scannerForm');
        const fileInput = document.getElementById('fileInput');
        const uploadLabel = document.getElementById('uploadLabel');
        const fileList = document.getElementById('fileList');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        let selectedFiles = [];
        let userTokens = null;

        // ==================== Google OAuth Login ====================

        googleLoginBtn.addEventListener('click', async () => {
            try {
                // Get OAuth URL from backend
                const response = await fetch(`${API_BASE_URL}/auth/google-login-url`);
                const data = await response.json();
                
                // Open OAuth dialog
                window.location.href = data.authUrl;
            } catch (error) {
                showStatus('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
            }
        });

        // Handle OAuth callback
        window.addEventListener('load', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                try {
                    showStatus('⏳ กำลังตรวจสอบสิทธิ์...', 'info');

                    // Send code to backend
                    const response = await fetch(`${API_BASE_URL}/auth/callback`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // Save tokens
                        userTokens = data.tokens;
                        localStorage.setItem('userTokens', JSON.stringify(userTokens));

                        // Show user info
                        document.getElementById('userName').textContent = data.user.name || 'User';
                        document.getElementById('userEmail').textContent = data.user.email;

                        // Switch UI
                        authSection.style.display = 'none';
                        userInfo.classList.add('show');
                        scannerForm.classList.add('show');

                        // Clear status
                        status.classList.remove('show');

                        // Clean URL
                        window.history.replaceState({}, document.title, window.location.pathname);

                        showStatus('✅ เข้าสู่ระบบสำเร็จ!', 'success');
                    } else {
                        showStatus('❌ เข้าสู่ระบบล้มเหลว', 'error');
                    }
                } catch (error) {
                    showStatus('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
                }
            }

            // Check if user already logged in
            const savedTokens = localStorage.getItem('userTokens');
            if (savedTokens && !code) {
                userTokens = JSON.parse(savedTokens);
                // Assume user is logged in
                authSection.style.display = 'none';
                userInfo.classList.add('show');
                scannerForm.classList.add('show');
                document.getElementById('userName').textContent = 'User';
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('userTokens');
            userTokens = null;
            authSection.style.display = 'block';
            userInfo.classList.remove('show');
            scannerForm.classList.remove('show');
            selectedFiles = [];
            renderFileList();
            showStatus('✅ ออกจากระบบแล้ว', 'success');
        });

        // ==================== File Upload ====================

        uploadLabel.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadLabel.classList.add('dragover');
        });

        uploadLabel.addEventListener('dragleave', () => {
            uploadLabel.classList.remove('dragover');
        });

        uploadLabel.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadLabel.classList.remove('dragover');
            addFiles(Array.from(e.dataTransfer.files));
        });

        uploadLabel.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
        });

        function addFiles(files) {
            selectedFiles = [...selectedFiles, ...files];
            renderFileList();
        }

        function renderFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const size = (file.size / 1024).toFixed(1);
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-item-name">${file.name}</span>
                    <span class="file-item-size">${size} KB</span>
                    <button type="button" class="btn-remove">❌</button>
                `;
                item.querySelector('.btn-remove').addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedFiles.splice(index, 1);
                    renderFileList();
                });
                fileList.appendChild(item);
            });
        }

        // ==================== Form Submit ====================

        scannerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!userTokens) {
                showStatus('❌ กรุณาลงชื่อเข้าสู่ระบบก่อน', 'error');
                return;
            }

            if (selectedFiles.length === 0) {
                showStatus('❌ กรุณาเลือกอย่างน้อย 1 เอกสาร', 'error');
                return;
            }

            const recipientEmail = document.getElementById('recipientEmail').value;
            const emailSubject = document.getElementById('emailSubject').value;
            const emailMessage = document.getElementById('emailMessage').value;

            submitBtn.disabled = true;
            showStatus(`⏳ กำลังประมวลผล ${selectedFiles.length} เอกสาร...`, 'info');

            try {
                // Mock document summary (ในจริงจะเรียก Claude API)
                const documentSummary = `เอกสารถูกสแกนเสร็จแล้ว ทั้งหมด ${selectedFiles.length} ไฟล์\n\nรายการเอกสาร:\n${selectedFiles.map(f => `- ${f.name}`).join('\n')}`;
                const documentNames = selectedFiles.map(f => f.name);

                // Send email
                const response = await fetch(`${API_BASE_URL}/api/send-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        refreshToken: userTokens.refresh_token,
                        recipientEmail,
                        emailSubject,
                        emailMessage,
                        documentSummary,
                        documentNames
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus(
                        `✅ ส่งอีเมลสำเร็จแล้ว!\n📧 ไปที่: ${recipientEmail}\n📄 เอกสาร: ${selectedFiles.length} ไฟล์`,
                        'success'
                    );
                    selectedFiles = [];
                    renderFileList();
                    scannerForm.reset();
                } else {
                    showStatus('❌ เกิดข้อผิดพลาด: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('❌ เกิดข้อผิดพลาด: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }
    </script>
</body>
</html>
